name: Unlock + Run

on:
  push:
    paths:
      - "key.txt"
      - "src/**"
      - "test/**"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Prevent re-unlock
      - name: Skip if already unlocked
        run: |
          if [ -f ".unlocked" ]; then
            echo "Already unlocked"
            exit 0
          fi

      # ✅ Compute filename from key
      - name: Derive encrypted filename
        run: |
          KEY=$(cat key.txt | tr -d '\n')
          FILE=$(echo -n "$KEY" | md5sum | cut -d ' ' -f1)

          echo "KEY=$KEY" >> $GITHUB_ENV
          echo "ENC_FILE=encrypted/${FILE}.enc" >> $GITHUB_ENV

      # ✅ Decrypt
      - name: Decrypt assignment
        run: |
          if [ ! -f "$ENC_FILE" ]; then
            echo "❌ Invalid key (no matching file)"
            exit 1
          fi

          openssl enc -d -aes-256-cbc \
            -in "$ENC_FILE" \
            -out assignment.tar \
            -pass pass:"$KEY" -pbkdf2

      # ✅ Extract
      - name: Extract assignment
        run: |
          tar -tf assignment.tar > /dev/null || {
            echo "❌ Invalid key (bad decrypt)"
            exit 1
          }

          tar -xf assignment.tar
          rm assignment.tar
          touch .unlocked

      # ✅ Run assignment logic (inside bundle)
      - name: Run assignment
        run: |
          chmod +x scripts/run.sh
          ./scripts/run.sh
