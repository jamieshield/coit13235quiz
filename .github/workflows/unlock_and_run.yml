###############################################################################
# REQUIREMENTS
#
# 1. REPO STRUCTURE
#
#    asg_<code>/
#      src/
#      test/
#      pom.xml
#
#    scripts/run.sh
#
#
# 2. ENVIRONMENT
#
#    - GitHub Actions (ubuntu-latest)
#    - Java 17
#    - Maven (via setup-java)
#
#
# 3. BEHAVIOUR
#
#    - Runs on ANY commit (push)
#    - Also allows manual trigger
#    - Assumes student already extracted assignment
#    - Executes scripts/run.sh which:
#         - finds latest asg_* folder
#         - runs mvn test
#
###############################################################################

name: Run Tests

on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run latest assignment
        run: |
         ls
         pwd
         LATEST=$(find . -type d -name "asg_*" -exec stat -c "%Y %n" {} \; | sort -nr | head -1 | cut -d' ' -f2-)
         cd "$LATEST"
         chmod +x ./scripts/run.sh
         ./scripts/run.sh

